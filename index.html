<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PapeLESS</title>

  <!-- Bootstrap 5.3.8 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
   rel="stylesheet"integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"crossorigin="anonymous">

  <style>
    body {
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      font-family: Arial, sans-serif;
    }

    /* HEADER / BANNER */
    .banner {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .banner h4 {
      font-weight: 800;
      margin: 0;
    }

    /* BUTTONS */
    .btn-light {
      background-color: #ffffff;
      border: none;
      color: #1e3a8a;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-light:hover {
      background-color: #e0ecff;
      color: #2563eb;
      transform: translateY(-1px);
    }

    /* DROPDOWN */
    .dropdown-menu {
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .dropdown-item:hover {
      background-color: #eef2ff;
      color: #1e3a8a;
    }

    /* SWITCH */
    .form-check-input {
      cursor: pointer;
      background-color: #c7d2fe;
      border: none;
    }

    .form-check-input:checked {
      background-color: #38bdf8;
    }

  </style>
</head>

<body>
  <!-- BANNER -->
  <div class="container-fluid banner py-4">
    <div class="row align-items-center">
      <div class="col">
        <h4>PapeLESS</h4>
      </div>
      <div class="col-4">
        <div class="row align-items-center text-end">
          <div class="col">
            <button class="btn btn-light btn-md rounded-5 w-50">
              Login
            </button>
          </div>
          <div class="col-4">
            <div class="form-check form-switch d-flex justify-content-end">
              <input class="form-check-input" type="checkbox">
            </div>
          </div>
          <div class="col-4">
            <div class="dropdown">
              <button class="btn btn-light btn-md" data-bs-toggle="dropdown">
                ☰
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Home</a></li>
                <li><a class="dropdown-item" href="#">About</a></li>
                <li><a class="dropdown-item" href="#">Contact</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>susunod</h1>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09cYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</body>
</html>
