<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PapeLESS - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1d368a, #4a87c4);
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* MAIN WRAPPER */
    .login-wrapper {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 15px 50px rgba(0,0,0,0.08);
    }

    /* LEFT PANEL (STRONG HEADER) */
    .left-panel {
      background: linear-gradient(135deg, #182d66, #2563eb);
      color: white;
      padding: 50px 40px;
    }

    .left-panel h2 {
      font-weight: 800;
      margin-bottom: 15px;
    }

    .left-panel p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* RIGHT PANEL */
    .login-card {
      background: #ffffff;
      padding: 50px 40px;
    }

    /* TITLE */
    .brand-title {
      font-weight: 800;
      font-size: 1.9rem;
      color: #1e3a8a;
    }

    /* INPUT */
    .form-control {
      border-radius: 10px;
      padding: 12px;
      border: 1px solid #dbeafe;
      background-color: #f9fbff;
    }

    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
      background-color: #ffffff;
    }

    /* BUTTON */
    .btn-custom {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-custom:hover {
      opacity: 0.95;
      transform: translateY(-2px);
    }

    /* LINKS */
    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      color: #38bdf8;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .left-panel {
        display: none;
      }
    }

  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-lg-8 col-xl-7">
        <div class="login-wrapper">
          <div class="row g-0">

            <!-- LEFT PANEL -->
            <div class="col-md-5 left-panel d-flex flex-column justify-content-center">
              <h2>PapeLESS</h2>
              <p>
                Streamline your On-the-Job Training (OJT) experience with a fully digital document submission and tracking system.
              </p>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-7">
              <div class="login-card">
                <div class="row mb-4">
                  <div class="col text-center">
                    <h4 class="brand-title">Welcome Back</h4>
                    <p class="text-muted">Login to your OJT portal</p>
                  </div>
                </div>

                <form>
                  <div class="row my-3">
                    <div class="col">
                      <label class="form-label">Username</label>
                      <input type="text" class="form-control" required>
                    </div>
                  </div>

                  <div class="row my-3">
                    <div class="col">
                      <label class="form-label">Password</label>
                      <input type="password" id="password" class="form-control" required>
                    </div>
                  </div>

                  <div class="row my-2">
                    <div class="col d-flex justify-content-between align-items-center">
                      <div>
                        <input type="checkbox" id="showPass" class="form-check-input">
                        <label class="form-check-label">Show Password</label>
                      </div>
                      <a href="#">Forgot?</a>
                    </div>
                  </div>

                  <div class="row my-4">
                    <div class="col">
                      <input type="submit" value="Login" class="btn btn-custom w-100">
                    </div>
                  </div>

                  <div class="row">
                    <div class="col text-center">
                      <span class="text-muted">No account?</span>
                      <a href="#" class="fw-semibold ms-1">Sign Up</a>
                    </div>
                  </div>
                </form>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const showPass = document.getElementById('showPass');
    const password = document.getElementById('password');

    showPass.addEventListener('change', function () {
      password.type = this.checked ? 'text' : 'password';
    });
  </script>

</body>
</html>
